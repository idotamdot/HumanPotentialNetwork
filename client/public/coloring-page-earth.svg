<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="800px" viewBox="0 0 800 800" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Save Our Earth - Coloring Page</title>
    <g id="Coloring-Page" stroke="black" stroke-width="3" fill="none" fill-rule="evenodd">
        <!-- Earth -->
        <circle id="Earth-Outline" cx="400" cy="400" r="250"></circle>
        
        <!-- Continents -->
        <path d="M250,250 C300,200 350,230 380,250 C410,270 430,300 420,330 C410,360 380,380 350,390 C320,400 280,410 260,390 C240,370 230,330 240,300 C250,270 270,260 250,250 Z" id="Continent-1"></path>
        
        <path d="M450,200 C480,180 520,190 550,220 C580,250 590,290 580,330 C570,370 540,400 510,410 C480,420 450,410 430,390 C410,370 400,340 410,310 C420,280 440,250 450,200 Z" id="Continent-2"></path>
        
        <path d="M300,450 C330,430 370,440 400,460 C430,480 450,510 440,540 C430,570 400,590 370,600 C340,610 300,600 280,580 C260,560 250,530 260,500 C270,470 290,440 300,450 Z" id="Continent-3"></path>
        
        <path d="M500,450 C530,430 570,440 600,460 C630,480 650,510 640,540 C630,570 600,590 570,600 C540,610 500,600 480,580 C460,560 450,530 460,500 C470,470 490,440 500,450 Z" id="Continent-4"></path>
        
        <!-- Trees -->
        <g id="Tree-1" transform="translate(120, 350)">
            <path d="M10,40 L10,80" id="Trunk" stroke-width="5"></path>
            <path d="M0,40 C10,25 20,40 10,40" id="Branches-1"></path>
            <path d="M0,30 C10,15 20,30 10,30" id="Branches-2"></path>
            <path d="M0,20 C10,5 20,20 10,20" id="Branches-3"></path>
        </g>
        
        <g id="Tree-2" transform="translate(170, 380)">
            <path d="M10,40 L10,80" id="Trunk" stroke-width="5"></path>
            <path d="M0,40 C10,25 20,40 10,40" id="Branches-1"></path>
            <path d="M0,30 C10,15 20,30 10,30" id="Branches-2"></path>
            <path d="M0,20 C10,5 20,20 10,20" id="Branches-3"></path>
        </g>
        
        <g id="Tree-3" transform="translate(650, 350)">
            <path d="M10,40 L10,80" id="Trunk" stroke-width="5"></path>
            <path d="M0,40 C10,25 20,40 10,40" id="Branches-1"></path>
            <path d="M0,30 C10,15 20,30 10,30" id="Branches-2"></path>
            <path d="M0,20 C10,5 20,20 10,20" id="Branches-3"></path>
        </g>
        
        <!-- Animals -->
        <g id="Bird-1" transform="translate(200, 200)">
            <path d="M0,10 C5,0 15,0 20,10" id="Wing"></path>
            <circle id="Body" cx="10" cy="15" r="5"></circle>
            <path d="M10,20 L10,25" id="Leg"></path>
        </g>
        
        <g id="Bird-2" transform="translate(230, 180)">
            <path d="M0,10 C5,0 15,0 20,10" id="Wing"></path>
            <circle id="Body" cx="10" cy="15" r="5"></circle>
            <path d="M10,20 L10,25" id="Leg"></path>
        </g>
        
        <g id="Fish" transform="translate(550, 500)">
            <path d="M0,10 C10,0 20,0 30,10 C20,20 10,20 0,10 Z" id="Body"></path>
            <path d="M30,10 L40,15" id="Tail-1"></path>
            <path d="M30,10 L40,5" id="Tail-2"></path>
            <circle id="Eye" cx="5" cy="7" r="1"></circle>
        </g>
        
        <!-- Sun -->
        <g id="Sun" transform="translate(650, 150)">
            <circle cx="0" cy="0" r="30"></circle>
            <path d="M0,-40 L0,-50" id="Ray-1"></path>
            <path d="M0,40 L0,50" id="Ray-2"></path>
            <path d="M-40,0 L-50,0" id="Ray-3"></path>
            <path d="M40,0 L50,0" id="Ray-4"></path>
            <path d="M-28,-28 L-35,-35" id="Ray-5"></path>
            <path d="M28,28 L35,35" id="Ray-6"></path>
            <path d="M-28,28 L-35,35" id="Ray-7"></path>
            <path d="M28,-28 L35,-35" id="Ray-8"></path>
        </g>
        
        <!-- Children -->
        <g id="Child-1" transform="translate(100, 550)">
            <circle id="Head" cx="15" cy="15" r="10"></circle>
            <path d="M15,25 L15,50" id="Body"></path>
            <path d="M15,35 L0,45" id="Arm-Left"></path>
            <path d="M15,35 L30,45" id="Arm-Right"></path>
            <path d="M15,50 L5,70" id="Leg-Left"></path>
            <path d="M15,50 L25,70" id="Leg-Right"></path>
        </g>
        
        <g id="Child-2" transform="translate(150, 550)">
            <circle id="Head" cx="15" cy="15" r="10"></circle>
            <path d="M15,25 L15,50" id="Body"></path>
            <path d="M15,35 L0,45" id="Arm-Left"></path>
            <path d="M15,35 L30,45" id="Arm-Right"></path>
            <path d="M15,50 L5,70" id="Leg-Left"></path>
            <path d="M15,50 L25,70" id="Leg-Right"></path>
        </g>
        
        <!-- House -->
        <g id="House" transform="translate(550, 600)">
            <rect id="Base" x="0" y="30" width="80" height="50"></rect>
            <path d="M0,30 L40,0 L80,30" id="Roof"></path>
            <rect id="Door" x="30" y="50" width="20" height="30"></rect>
            <rect id="Window-1" x="10" y="40" width="15" height="15"></rect>
            <rect id="Window-2" x="55" y="40" width="15" height="15"></rect>
        </g>
        
        <!-- Plants -->
        <g id="Flower-1" transform="translate(490, 650)">
            <path d="M10,0 L10,30" id="Stem"></path>
            <circle id="Petal-1" cx="10" cy="0" r="5"></circle>
            <circle id="Petal-2" cx="15" cy="5" r="5"></circle>
            <circle id="Petal-3" cx="5" cy="5" r="5"></circle>
        </g>
        
        <g id="Flower-2" transform="translate(470, 660)">
            <path d="M10,0 L10,30" id="Stem"></path>
            <circle id="Petal-1" cx="10" cy="0" r="5"></circle>
            <circle id="Petal-2" cx="15" cy="5" r="5"></circle>
            <circle id="Petal-3" cx="5" cy="5" r="5"></circle>
        </g>
        
        <!-- Title -->
        <text id="Title" font-family="Arial" font-size="48" font-weight="bold" x="400" y="100" text-anchor="middle" stroke-width="1" fill="black">Save Our Earth</text>
        <text id="Subtitle" font-family="Arial" font-size="24" font-weight="normal" x="400" y="130" text-anchor="middle" stroke-width="0.5" fill="black">Color me and learn how to protect our planet!</text>
    </g>
</svg>