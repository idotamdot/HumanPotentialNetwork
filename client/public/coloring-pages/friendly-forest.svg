  <!-- Title -->
  <text x="400" y="80" font-family="Arial" font-size="32" text-anchor="middle" fill="none" stroke="black" stroke-width="1">Friendly Forest!</text>
  <text x="400" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="none" stroke="black" stroke-width="0.5">Color the forest and all its friendly creatures!</text>
