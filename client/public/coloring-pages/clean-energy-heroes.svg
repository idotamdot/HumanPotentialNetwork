<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <title>Clean Energy Heroes - Coloring Page</title>
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
      <rdf:Description>
        <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Clean Energy Heroes Coloring Page</dc:title>
        <dc:creator xmlns:dc="http://purl.org/dc/elements/1.1/">Human Potential Network</dc:creator>
      </rdf:Description>
    </rdf:RDF>
  </metadata>
  
  <!-- Sky background -->
  <path d="M0,0 L800,0 L800,400 L0,400 Z" 
        fill="none" stroke="black" stroke-width="0.5" stroke-dasharray="5,5"/>
  
  <!-- Ground -->
  <path d="M0,400 L800,400 L800,600 L0,600 Z" 
        fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Sun with rays -->
  <circle cx="700" cy="100" r="50" fill="none" stroke="black" stroke-width="2"/>
  <path d="M700,30 L700,10 M760,100 L780,100 M670,40 L650,20 M760,40 L780,20 M670,160 L650,180 M760,160 L780,180 M640,100 L620,100 M700,170 L700,190"
        stroke="black" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Wind Turbines -->
  <path d="M200,400 L200,300" stroke="black" stroke-width="5"/>
  <circle cx="200" cy="300" r="5" fill="none" stroke="black" stroke-width="2"/>
  <path d="M200,300 L150,250 M200,300 L240,230 M200,300 L260,330" 
        fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  
  <path d="M300,400 L300,330" stroke="black" stroke-width="5"/>
  <circle cx="300" cy="330" r="5" fill="none" stroke="black" stroke-width="2"/>
  <path d="M300,330 L260,290 M300,330 L330,270 M300,330 L350,350" 
        fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  
  <path d="M400,400 L400,280" stroke="black" stroke-width="5"/>
  <circle cx="400" cy="280" r="5" fill="none" stroke="black" stroke-width="2"/>
  <path d="M400,280 L350,220 M400,280 L440,200 M400,280 L460,310" 
        fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Solar Panels -->
  <rect x="550" y="350" width="200" height="100" fill="none" stroke="black" stroke-width="2"/>
  <line x1="550" y1="375" x2="750" y2="375" stroke="black" stroke-width="1"/>
  <line x1="550" y1="400" x2="750" y2="400" stroke="black" stroke-width="1"/>
  <line x1="550" y1="425" x2="750" y2="425" stroke="black" stroke-width="1"/>
  <line x1="575" y1="350" x2="575" y2="450" stroke="black" stroke-width="1"/>
  <line x1="600" y1="350" x2="600" y2="450" stroke="black" stroke-width="1"/>
  <line x1="625" y1="350" x2="625" y2="450" stroke="black" stroke-width="1"/>
  <line x1="650" y1="350" x2="650" y2="450" stroke="black" stroke-width="1"/>
  <line x1="675" y1="350" x2="675" y2="450" stroke="black" stroke-width="1"/>
  <line x1="700" y1="350" x2="700" y2="450" stroke="black" stroke-width="1"/>
  <line x1="725" y1="350" x2="725" y2="450" stroke="black" stroke-width="1"/>
  
  <!-- Energy Hero 1 - Wind Boy -->
  <circle cx="100" cy="350" r="20" fill="none" stroke="black" stroke-width="2"/> <!-- Head -->
  <path d="M100,370 L100,420" stroke="black" stroke-width="2"/> <!-- Body -->
  <path d="M100,380 L70,410 M100,380 L130,410" stroke="black" stroke-width="2"/> <!-- Arms -->
  <path d="M100,420 L80,460 M100,420 L120,460" stroke="black" stroke-width="2"/> <!-- Legs -->
  <path d="M90,345 L95,345 M105,345 L110,345" stroke="black" stroke-width="1.5"/> <!-- Eyes -->
  <path d="M100,355 C95,355 105,355 100,360" fill="none" stroke="black" stroke-width="1.5"/> <!-- Smile -->
  <path d="M100,330 L85,310 L115,310 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Cape -->
  <text x="100" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="none" stroke="black" stroke-width="0.5">Wind Warrior</text>
  
  <!-- Energy Hero 2 - Solar Girl -->
  <circle cx="500" cy="350" r="20" fill="none" stroke="black" stroke-width="2"/> <!-- Head -->
  <path d="M500,370 L500,420" stroke="black" stroke-width="2"/> <!-- Body -->
  <path d="M500,380 L470,410 M500,380 L530,410" stroke="black" stroke-width="2"/> <!-- Arms -->
  <path d="M500,420 L480,460 M500,420 L520,460" stroke="black" stroke-width="2"/> <!-- Legs -->
  <path d="M490,345 L495,345 M505,345 L510,345" stroke="black" stroke-width="1.5"/> <!-- Eyes -->
  <path d="M500,355 C495,355 505,355 500,360" fill="none" stroke="black" stroke-width="1.5"/> <!-- Smile -->
  <circle cx="500" cy="330" r="15" fill="none" stroke="black" stroke-width="2"/> <!-- Sun crown -->
  <path d="M500,315 L500,305 M515,330 L525,330 M510,320 L520,310 M490,320 L480,310 M485,330 L475,330" 
        stroke="black" stroke-width="1.5" stroke-linecap="round"/> <!-- Sun rays -->
  <text x="500" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="none" stroke="black" stroke-width="0.5">Solar Sprout</text>
  
  <!-- House with solar roof -->
  <path d="M50,500 L150,500 L150,450 L50,450 Z" fill="none" stroke="black" stroke-width="2"/> <!-- House body -->
  <path d="M50,450 L100,400 L150,450" fill="none" stroke="black" stroke-width="2"/> <!-- Roof -->
  <rect x="70" y="470" width="20" height="30" fill="none" stroke="black" stroke-width="1.5"/> <!-- Door -->
  <circle cx="85" cy="485" r="2" fill="black"/> <!-- Doorknob -->
  <rect x="110" y="470" width="20" height="20" fill="none" stroke="black" stroke-width="1.5"/> <!-- Window -->
  <line x1="120" y1="470" x2="120" y2="490" stroke="black" stroke-width="1"/> <!-- Window divider -->
  <line x1="110" y1="480" x2="130" y2="480" stroke="black" stroke-width="1"/> <!-- Window divider -->
  
  <!-- Small solar panels on roof -->
  <rect x="60" y="420" width="30" height="15" fill="none" stroke="black" stroke-width="1"/>
  <rect x="95" y="410" width="30" height="15" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- Electric car -->
  <path d="M600,500 L650,500 C670,500 670,480 650,480 L600,480 C580,480 580,500 600,500 Z" 
        fill="none" stroke="black" stroke-width="2"/> <!-- Car body -->
  <circle cx="610" cy="500" r="10" fill="none" stroke="black" stroke-width="1.5"/> <!-- Wheel 1 -->
  <circle cx="640" cy="500" r="10" fill="none" stroke="black" stroke-width="1.5"/> <!-- Wheel 2 -->
  <rect x="620" y="470" width="20" height="10" fill="none" stroke="black" stroke-width="1"/> <!-- Window -->
  <path d="M580,490 L590,490" stroke="black" stroke-width="2"/> <!-- Charging plug -->
  <path d="M670,490 C680,485 680,495 670,490" fill="none" stroke="black" stroke-width="1.5"/> <!-- Light beam -->
  
  <!-- Birds in the sky -->
  <path d="M250,150 C260,140 270,150 280,140" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M280,100 C290,90 300,100 310,90" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M350,120 C360,110 370,120 380,110" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="400" y="80" font-family="Arial" font-size="32" text-anchor="middle" fill="none" stroke="black" stroke-width="1">Clean Energy Heroes!</text>
  <text x="400" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="none" stroke="black" stroke-width="0.5">Color the heroes and help them power our world with clean energy!</text>
</svg>