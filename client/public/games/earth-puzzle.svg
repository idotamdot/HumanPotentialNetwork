<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <title>Earth Puzzle - Game</title>
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
      <rdf:Description>
        <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Earth Puzzle Game</dc:title>
        <dc:creator xmlns:dc="http://purl.org/dc/elements/1.1/">Human Potential Network</dc:creator>
      </rdf:Description>
    </rdf:RDF>
  </metadata>
  
  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="32" text-anchor="middle" fill="black">Earth Puzzle</text>
  <text x="400" y="80" font-family="Arial" font-size="16" text-anchor="middle" fill="black">Cut out the puzzle pieces, mix them up, and put them back together to form Earth!</text>
  
  <!-- Earth Puzzle - 9 Pieces -->
  <!-- Top Row -->
  <g transform="translate(200, 200)">
    <!-- Piece 1 - Top Left -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M100,80 Q90,85 100,90 M80,100 Q85,90 90,100" fill="none" stroke="black" stroke-width="2"/>
    <path d="M30,30 Q40,20 50,40 Q70,50 50,60" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">1</text>
  </g>
  
  <g transform="translate(350, 200)">
    <!-- Piece 2 - Top Center -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M0,80 Q10,85 0,90 M100,80 Q90,85 100,90 M80,100 Q85,90 90,100" fill="none" stroke="black" stroke-width="2"/>
    <path d="M50,50 Q60,30 70,50 Q80,60 60,70" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">2</text>
  </g>
  
  <g transform="translate(500, 200)">
    <!-- Piece 3 - Top Right -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M0,80 Q10,85 0,90" fill="none" stroke="black" stroke-width="2"/>
    <path d="M30,60 Q40,50 60,70 Q80,50 90,60" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">3</text>
  </g>
  
  <!-- Middle Row -->
  <g transform="translate(200, 350)">
    <!-- Piece 4 - Middle Left -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M100,80 Q90,85 100,90 M80,0 Q85,10 90,0 M80,100 Q85,90 90,100" fill="none" stroke="black" stroke-width="2"/>
    <path d="M40,30 Q50,40 40,60 Q30,80 50,90" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">4</text>
  </g>
  
  <g transform="translate(350, 350)">
    <!-- Piece 5 - Middle Center (Earth's center) -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M0,80 Q10,85 0,90 M100,80 Q90,85 100,90 M80,0 Q85,10 90,0 M20,0 Q15,10 10,0 M80,100 Q85,90 90,100 M20,100 Q15,90 10,100" fill="none" stroke="black" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="black">5</text>
  </g>
  
  <g transform="translate(500, 350)">
    <!-- Piece 6 - Middle Right -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M0,80 Q10,85 0,90 M20,0 Q15,10 10,0 M20,100 Q15,90 10,100" fill="none" stroke="black" stroke-width="2"/>
    <path d="M50,30 Q60,40 70,20 Q90,50 70,70" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">6</text>
  </g>
  
  <!-- Bottom Row -->
  <g transform="translate(200, 500)">
    <!-- Piece 7 - Bottom Left -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M80,0 Q85,10 90,0" fill="none" stroke="black" stroke-width="2"/>
    <path d="M20,20 Q40,30 30,50 Q50,70 60,50" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">7</text>
  </g>
  
  <g transform="translate(350, 500)">
    <!-- Piece 8 - Bottom Center -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M80,0 Q85,10 90,0 M20,0 Q15,10 10,0" fill="none" stroke="black" stroke-width="2"/>
    <path d="M30,40 Q50,20 70,40 Q60,60 40,70" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">8</text>
  </g>
  
  <g transform="translate(500, 500)">
    <!-- Piece 9 - Bottom Right -->
    <path d="M0,0 L100,0 L100,100 L0,100 Z M20,0 Q15,10 10,0" fill="none" stroke="black" stroke-width="2"/>
    <path d="M40,20 Q60,30 50,50 Q60,70 80,60" fill="none" stroke="black" stroke-width="1"/>
    <text x="50" y="50" font-family="Arial" font-size="14" text-anchor="middle" fill="black">9</text>
  </g>
  
  <!-- Instructions -->
  <text x="400" y="150" font-family="Arial" font-size="16" text-anchor="middle" fill="black">Instructions:</text>
  <text x="400" y="170" font-family="Arial" font-size="14" text-anchor="middle" fill="black">1. Print this page</text>
  <text x="400" y="190" font-family="Arial" font-size="14" text-anchor="middle" fill="black">2. Cut along the black lines to create 9 puzzle pieces</text>
  <text x="400" y="570" font-family="Arial" font-size="14" text-anchor="middle" fill="black">3. Mix them up and put them back together to form the Earth!</text>
</svg>