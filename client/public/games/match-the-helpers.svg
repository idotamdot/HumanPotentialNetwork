<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <title>Match the Helpers - Game</title>
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
      <rdf:Description>
        <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Match the Helpers Game</dc:title>
        <dc:creator xmlns:dc="http://purl.org/dc/elements/1.1/">Human Potential Network</dc:creator>
      </rdf:Description>
    </rdf:RDF>
  </metadata>
  
  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="32" text-anchor="middle" fill="black">Match the Helpers!</text>
  <text x="400" y="80" font-family="Arial" font-size="16" text-anchor="middle" fill="black">Draw a line to match each helper with what they use to help others.</text>
  
  <!-- Left column: Helpers -->
  <g transform="translate(150, 150)">
    <!-- Firefighter -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="black" stroke-width="2"/>
    <path d="M-10,-20 L-5,-20 M10,-20 L5,-20" stroke="black" stroke-width="2"/> <!-- Eyes -->
    <path d="M0,0 C-10,0 10,0 0,10" fill="none" stroke="black" stroke-width="2"/> <!-- Smile -->
    <path d="M-25,-30 L25,-30 L20,-15 L-20,-15 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Helmet -->
    <path d="M-20,20 L20,20 L20,50 L-20,50 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Jacket -->
    <text x="0" y="85" font-family="Arial" font-size="14" text-anchor="middle" fill="black">Firefighter</text>
  </g>
  
  <g transform="translate(150, 300)">
    <!-- Doctor -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="black" stroke-width="2"/>
    <path d="M-10,-20 L-5,-20 M10,-20 L5,-20" stroke="black" stroke-width="2"/> <!-- Eyes -->
    <path d="M0,0 C-10,0 10,0 0,10" fill="none" stroke="black" stroke-width="2"/> <!-- Smile -->
    <path d="M-25,0 L25,0 L25,50 L-25,50 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Coat -->
    <ellipse cx="-5" cy="-50" rx="30" ry="10" fill="none" stroke="black" stroke-width="2"/> <!-- Stethoscope -->
    <path d="M-5,-40 L-5,-10" fill="none" stroke="black" stroke-width="2"/> <!-- Stethoscope -->
    <text x="0" y="85" font-family="Arial" font-size="14" text-anchor="middle" fill="black">Doctor</text>
  </g>
  
  <g transform="translate(150, 450)">
    <!-- Teacher -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="black" stroke-width="2"/>
    <path d="M-10,-20 L-5,-20 M10,-20 L5,-20" stroke="black" stroke-width="2"/> <!-- Eyes -->
    <path d="M0,0 C-10,0 10,0 0,10" fill="none" stroke="black" stroke-width="2"/> <!-- Smile -->
    <path d="M-20,15 L20,15 L20,50 L-20,50 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Clothes -->
    <rect x="-40" y="-20" width="20" height="25" fill="none" stroke="black" stroke-width="1.5"/> <!-- Book -->
    <text x="0" y="85" font-family="Arial" font-size="14" text-anchor="middle" fill="black">Teacher</text>
  </g>
  
  <!-- Right column: Tools -->
  <g transform="translate(600, 450)">
    <!-- Book and Apple -->
    <rect x="-40" y="-25" width="60" height="40" fill="none" stroke="black" stroke-width="2"/> <!-- Book -->
    <path d="M-40,-5 L20,-5" stroke="black" stroke-width="1"/> <!-- Book page line -->
    <circle cx="40" cy="0" r="20" fill="none" stroke="black" stroke-width="2"/> <!-- Apple -->
    <path d="M40,-20 L45,-35" stroke="black" stroke-width="2"/> <!-- Apple stem -->
    <path d="M45,-35 C50,-35 55,-30 60,-30" fill="none" stroke="black" stroke-width="1.5"/> <!-- Apple leaf -->
  </g>
  
  <g transform="translate(600, 150)">
    <!-- Fire hose and helmet -->
    <path d="M-50,0 C-30,20 30,-20 50,0" fill="none" stroke="black" stroke-width="3"/> <!-- Hose -->
    <circle cx="-50" cy="0" r="10" fill="none" stroke="black" stroke-width="2"/> <!-- Hose connector -->
    <path d="M-10,-30 L40,-30 L50,-10 L0,-10 Z" fill="none" stroke="black" stroke-width="2"/> <!-- Helmet -->
  </g>
  
  <g transform="translate(600, 300)">
    <!-- Medical tools -->
    <rect x="-50" y="-20" width="70" height="40" rx="5" ry="5" fill="none" stroke="black" stroke-width="2"/> <!-- First aid kit -->
    <path d="M-15,-20 L-15,20 M-50,0 L20,0" stroke="black" stroke-width="2"/> <!-- Red cross -->
    <path d="M40,-10 L60,10 M40,10 L60,-10" stroke="black" stroke-width="2"/> <!-- Scissors -->
    <circle cx="50" cy="0" r="5" fill="none" stroke="black" stroke-width="1.5"/> <!-- Scissors pivot -->
  </g>
  
  <!-- Instructions -->
  <text x="400" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="black">Print this page and draw lines to connect each helper with their tools!</text>
</svg>